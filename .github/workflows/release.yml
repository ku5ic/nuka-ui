name: Release

on:
  push:
    branches: [main]

# contents/pull-requests: required for Changesets to open PRs and create GitHub releases.
# id-token: required for npm trusted publishing (OIDC). Without it the npm CLI cannot
# request a short-lived OIDC token and silently falls back to token auth (or fails).
permissions:
  contents: write
  pull-requests: write
  id-token: write

# One release at a time; never cancel in-progress runs
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history required for Changesets version detection
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      # setup-node@v6 with Node 22 ships an npm older than 11.5.1, which is the floor
      # for trusted publishing / OIDC detection. Pin a known-good version rather than
      # @latest so a future npm release cannot change publish behavior without a commit.
      - name: Update npm for OIDC support
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Test ESLint plugin
        run: npm run test:eslint-plugin

      - name: Verify dist directives and public API
        run: npm run test:dist

      - name: Build
        run: npm run build

      # NODE_AUTH_TOKEN is intentionally removed. With id-token: write above and a
      # trusted publisher configured on npmjs.com, the npm CLI authenticates via OIDC
      # and publishes provenance automatically. GITHUB_TOKEN is still required for the
      # Changesets version PR and GitHub release.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
