name: Release

on:
  push:
    branches: [main]

# Required for Changesets to open PRs and create GitHub releases
permissions:
  contents: write
  pull-requests: write

# One release at a time; never cancel in-progress runs
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: false # temporarily disabled: waiting for npm 24-hour republish window to expire

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history required for Changesets version detection
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
